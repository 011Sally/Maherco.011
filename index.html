    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            doc, 
            setDoc, 
            getDoc, 
            getDocs, 
            query, 
            where, 
            onSnapshot,
            serverTimestamp,
            deleteDoc,
            updateDoc,
            addDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعداد Firebase الخاص بك
        const firebaseConfig = {
            apiKey: "AIzaSyAFnNLUYGeB2hZRj9qNyzzN1kBg9_GCLX4",
            authDomain: "maherco-challenges-4b5a5.firebaseapp.com",
            projectId: "maherco-challenges-4b5a5",
            storageBucket: "maherco-challenges-4b5a5.firebasestorage.app",
            messagingSenderId: "417329658328",
            appId: "1:417329658328:web:f871bb5e99ea7ba8b85aad"
        };

        window.firebaseApp = initializeApp(firebaseConfig);
        window.db = getFirestore(firebaseApp);

        // مراجع المجموعات
        window.COLLECTIONS = {
            USERS: 'users',
            PLAYERS: 'players',
            GAMES: 'games',
            CARDS: 'cards',
            CHALLENGES: 'challenges',
            NOTES: 'notes',
            SETTINGS: 'settings'
        };

        // دوال مساعدة لـ Firestore
        window.firestoreHelpers = {
            // حفظ مستند
            saveDoc: async (collectionName, id, data) => {
                try {
                    const docRef = doc(db, collectionName, id.toString());
                    await setDoc(docRef, {
                        ...data,
                        updatedAt: serverTimestamp()
                    }, { merge: true });
                    return { success: true };
                } catch (error) {
                    console.error(`خطأ في حفظ ${collectionName}:`, error);
                    return { success: false, error };
                }
            },
            
            // الحصول على مستند
            getDoc: async (collectionName, id) => {
                try {
                    const docRef = doc(db, collectionName, id.toString());
                    const docSnap = await getDoc(docRef);
                    return docSnap.exists() ? docSnap.data() : null;
                } catch (error) {
                    console.error(`خطأ في جلب ${collectionName}:`, error);
                    return null;
                }
            },
            
            // جلب جميع مستندات مجموعة
            getAllDocs: async (collectionName) => {
                try {
                    const querySnapshot = await getDocs(collection(db, collectionName));
                    return querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (error) {
                    console.error(`خطأ في جلب ${collectionName}:`, error);
                    return [];
                }
            },
            
            // حذف مستند
            deleteDoc: async (collectionName, id) => {
                try {
                    await deleteDoc(doc(db, collectionName, id.toString()));
                    return { success: true };
                } catch (error) {
                    console.error(`خطأ في حذف ${collectionName}:`, error);
                    return { success: false, error };
                }
            },
            
            // الاستماع للتحديثات الفورية
            listenToCollection: (collectionName, callback) => {
                return onSnapshot(collection(db, collectionName), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    callback(data);
                });
            }
        };
    </script>

<body>
    <div id="app"></div>

    <script>
        // البيانات الأساسية
        const appData = {
            currentUser: null,
            currentPage: 'login',
            pageHistory: [],
            siteName: 'Maherco',
            games: ['Cs2'],
            players: [
                { id: 1, name: 'Maherco', points: 0, challenges: 0, cards: 0, instagram: '', challengeHistory: [] }
            ],
            cards: ['X2'],
            users: [],
            currentChallenges: [],
            savedChallenges: [],
            notes: [],
            wheelStep: 'games',
            selectedGame: null,
            currentChallenge: null,
            availablePlayers: [],
            availableCards: [],
            rotation: 0,
            isSpinning: false,
            selectedPlayer: null,
            soundEnabled: true,
            musicEnabled: false,
            listeners: [] // لتخزين الاشتراكات الفورية
        };

        // عنصر الصوت
        const audioElement = document.createElement('audio');
        audioElement.id = 'wheel-audio';
        audioElement.preload = 'auto';
        audioElement.style.display = 'none';
        audioElement.src = 'wheel-voice.mp3';
        document.body.appendChild(audioElement);

        const musicElement = document.createElement('audio');
        musicElement.id = 'background-music';
        musicElement.loop = true;
        musicElement.style.display = 'none';
        musicElement.src = 'Interstellar.mp3';
        document.body.appendChild(musicElement);

        function playWheelSound() {
            if (!appData.soundEnabled) return;
            try {
                const audio = document.getElementById('wheel-audio');
                if (audio) {
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log('مشكلة في تشغيل الصوت:', e));
                }
            } catch (e) {
                console.log('مشكلة في تشغيل الصوت الميكانيكي:', e);
            }
        }

        function toggleMusic() {
            const music = document.getElementById('background-music');
            if (!music) return;
            
            if (music.paused) {
                music.currentTime = 0;
                music.play().catch(e => console.log('مشكلة في تشغيل الموسيقى:', e));
                appData.musicEnabled = true;
            } else {
                music.pause();
                music.currentTime = 0;
                appData.musicEnabled = false;
            }
            
            localStorage.setItem('MahercoMusicEnabled', JSON.stringify(appData.musicEnabled));
            saveData();
            render();
        }

        function createSparkles() {
            setInterval(() => {
                for (let i = 0; i < 3; i++) {
                    if (Math.random() > 0.5) {
                        setTimeout(() => {
                            const star = document.createElement('div');
                            star.className = 'star';
                            star.style.left = Math.random() * 100 + '%';
                            star.style.top = Math.random() * 100 + '%';
                            star.style.width = (Math.random() * 6 + 4) + 'px';
                            star.style.height = star.style.width;
                            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                            document.body.appendChild(star);
                            setTimeout(() => star.remove(), 5000 + Math.random() * 3000);
                        }, i * 200);
                    }
                }
            }, 800);
        }

        function createMeteorShower() {
            // ... نفس الكود الأصلي ...
        }

        function showResultBanner(text, nextStep) {
            const banner = document.createElement('div');
            banner.className = 'result-banner';
            banner.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px;">
                    <span>${text}</span>
                    <button class="btn btn-primary" onclick="this.closest('.result-banner').remove(); ${nextStep}">التالي →</button>
                </div>
            `;
            document.body.appendChild(banner);
            setTimeout(() => banner.style.top = '20px', 100);
            createMeteorShower();
            setTimeout(() => createMeteorShower(), 500);
            setTimeout(() => { if (banner.parentNode) banner.remove(); }, 10000);
        }

        // دوال التنقل
        function navigateTo(page) {
            appData.pageHistory.push(appData.currentPage);
            appData.currentPage = page;
            render();
        }

        function goBack() {
            if (appData.pageHistory.length > 0) {
                appData.currentPage = appData.pageHistory.pop();
                render();
            }
        }

        function logout() {
            const music = document.getElementById('background-music');
            if (music && !music.paused) {
                music.pause();
                music.currentTime = 0;
            }
            appData.musicEnabled = false;
            localStorage.setItem('MahercoMusicEnabled', 'false');
            
            // إيقاف الاستماع الفوري
            appData.listeners.forEach(unsubscribe => unsubscribe());
            appData.listeners = [];
            
            appData.currentUser = null;
            appData.currentPage = 'login';
            appData.pageHistory = [];
            localStorage.removeItem('MahercoCurrentUser');
            render();
        }

        // صفحة تسجيل الدخول
        function renderLogin() {
            return `
                <div class="login-container">
                    <div class="login-box">
                        <h1 class="title text-center mb-4">${appData.siteName}</h1>
                        <input type="text" id="username" class="input" placeholder="اسم المستخدم">
                        <input type="password" id="password" class="input" placeholder="كلمة المرور">
                        <button class="btn btn-primary" style="width: 100%;" onclick="handleLogin()">تسجيل الدخول</button>
                        <div id="login-error" class="error-message hidden"></div>
                    </div>
                </div>
            `;
        }

        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            
            if (!username || !password) {
                errorDiv.textContent = 'الرجاء إدخال اسم المستخدم وكلمة المرور';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                errorDiv.classList.add('hidden');
                showLoading('جاري تسجيل الدخول...');
                
                // البحث عن المستخدم في Firestore
                const usersQuery = query(
                    collection(db, COLLECTIONS.USERS),
                    where('username', '==', username),
                    where('password', '==', password)
                );
                
                const querySnapshot = await getDocs(usersQuery);
                hideLoading();
                
                if (!querySnapshot.empty) {
                    const userData = querySnapshot.docs[0].data();
                    appData.currentUser = userData;
                    appData.currentPage = 'home';
                    
                    // حفظ جلسة المستخدم
                    localStorage.setItem('MahercoCurrentUser', JSON.stringify({
                        username: userData.username,
                        loginTime: new Date().toISOString()
                    }));
                    
                    // بدء الاستماع للتحديثات الفورية
                    initRealTimeListeners();
                    
                    render();
                } else {
                    errorDiv.textContent = 'خطأ في اسم المستخدم أو كلمة المرور';
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                hideLoading();
                console.error('خطأ في تسجيل الدخول:', e);
                errorDiv.textContent = 'حدث خطأ في الاتصال بالخادم: ' + e.message;
                errorDiv.classList.remove('hidden');
            }
        }

        // الصفحة الرئيسية
        function renderHome() {
            const menuItems = [
                { icon: '🎡', label: 'دولاب الحظ', page: 'wheel', allowed: ['admin'] },
                { icon: '🎯', label: 'التحديات الحالية', page: 'current', allowed: ['admin', 'player', 'guest'] },
                { icon: '📕', label: 'التحديات المحفوظة', page: 'saved', allowed: ['admin', 'player'] },
                { icon: '🏆', label: 'ترتيب اللاعبين', page: 'ranking', allowed: ['admin', 'player', 'guest'] },
                { icon: '⚙️', label: 'الإعدادات', page: 'settings', allowed: ['admin'] },
                { icon: '📝', label: 'الملاحظات', page: 'notes', allowed: ['admin', 'player'] }
            ];

            const filteredItems = menuItems.filter(item => item.allowed.includes(appData.currentUser.type));

            return `
                <div class="container">
                    <div class="header">
                        <h1 class="title">${appData.siteName}</h1>
                        <button class="btn btn-logout" onclick="logout()">تسجيل الخروج</button>
                    </div>
                    <div class="menu-grid">
                        ${filteredItems.map(item => `
                            <button class="menu-item" onclick="navigateTo('${item.page}')">
                                <div style="font-size: 3rem;">${item.icon}</div>
                                <span>${item.label}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // دوال حفظ وتحميل البيانات من Firebase
        async function saveData() {
            if (!appData.currentUser || appData.currentUser.type !== 'admin') {
                console.warn('فقط المدير يمكنه حفظ البيانات');
                return;
            }

            try {
                showLoading('جاري حفظ البيانات...');
                
                // حفظ الإعدادات
                await firestoreHelpers.saveDoc(COLLECTIONS.SETTINGS, 'appConfig', {
                    siteName: appData.siteName,
                    soundEnabled: appData.soundEnabled,
                    musicEnabled: appData.musicEnabled,
                    games: appData.games,
                    cards: appData.cards
                });

                // حفظ اللاعبين
                for (const player of appData.players) {
                    await firestoreHelpers.saveDoc(COLLECTIONS.PLAYERS, player.id, player);
                }

                // حفظ التحديات
                const allChallenges = [...appData.currentChallenges, ...appData.savedChallenges];
                for (const challenge of allChallenges) {
                    await firestoreHelpers.saveDoc(COLLECTIONS.CHALLENGES, challenge.id, challenge);
                }

                // حفظ الملاحظات
                for (const note of appData.notes) {
                    await firestoreHelpers.saveDoc(COLLECTIONS.NOTES, note.id, note);
                }

                hideLoading();
                console.log('✅ تم حفظ جميع البيانات في Firestore');
            } catch (error) {
                hideLoading();
                console.error('❌ خطأ في حفظ البيانات:', error);
                alert('حدث خطأ أثناء الحفظ: ' + error.message);
            }
        }

        async function loadData() {
            try {
                showLoading('جاري تحميل البيانات...');
                
                // تحميل الإعدادات
                const settings = await firestoreHelpers.getDoc(COLLECTIONS.SETTINGS, 'appConfig');
                if (settings) {
                    appData.siteName = settings.siteName || 'Maherco';
                    appData.soundEnabled = settings.soundEnabled !== false;
                    appData.musicEnabled = settings.musicEnabled || false;
                    appData.games = settings.games || ['Cs2'];
                    appData.cards = settings.cards || ['X2'];
                }

                // تحميل اللاعبين
                appData.players = await firestoreHelpers.getAllDocs(COLLECTIONS.PLAYERS);
                
                // تحميل المستخدمين
                appData.users = await firestoreHelpers.getAllDocs(COLLECTIONS.USERS);
                
                // تحميل التحديات
                const allChallenges = await firestoreHelpers.getAllDocs(COLLECTIONS.CHALLENGES);
                appData.currentChallenges = allChallenges.filter(c => c.status === 'current');
                appData.savedChallenges = allChallenges.filter(c => c.status === 'saved');
                
                // تحميل الملاحظات
                appData.notes = await firestoreHelpers.getAllDocs(COLLECTIONS.NOTES);
                
                // تحميل إعدادات المستخدم
                const savedSound = localStorage.getItem('MahercoSoundEnabled');
                if (savedSound !== null) {
                    appData.soundEnabled = JSON.parse(savedSound);
                }
                
                const savedMusic = localStorage.getItem('MahercoMusicEnabled');
                if (savedMusic !== null) {
                    appData.musicEnabled = JSON.parse(savedMusic);
                }

                hideLoading();
                console.log('✅ تم تحميل جميع البيانات من Firestore');
            } catch (error) {
                hideLoading();
                console.error('❌ خطأ في تحميل البيانات:', error);
                // محاولة التحميل من localStorage كاحتياطي
                loadFromLocalStorage();
            }
        }

        // تحميل من localStorage كاحتياطي
        function loadFromLocalStorage() {
            try {
                const savedData = localStorage.getItem('MahercoChallengesData');
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    Object.assign(appData, parsed);
                }
                
                const savedUser = localStorage.getItem('MahercoCurrentUser');
                if (savedUser) {
                    const userData = JSON.parse(savedUser);
                    const user = appData.users.find(u => u.username === userData.username);
                    if (user) {
                        appData.currentUser = user;
                        appData.currentPage = 'home';
                    }
                }
            } catch (e) {
                console.warn('تعذر تحميل البيانات المحلية:', e);
            }
        }

        // الاستماع الفوري للتحديثات
        function initRealTimeListeners() {
            if (!appData.currentUser) return;

            // استماع للاعبين
            const unsubscribePlayers = firestoreHelpers.listenToCollection(
                COLLECTIONS.PLAYERS,
                (players) => {
                    appData.players = players;
                    if (appData.currentPage === 'ranking' || appData.currentPage === 'player-details') {
                        render();
                    }
                }
            );
            appData.listeners.push(unsubscribePlayers);

            // استماع للتحديات
            const unsubscribeChallenges = onSnapshot(
                collection(db, COLLECTIONS.CHALLENGES),
                (snapshot) => {
                    appData.currentChallenges = [];
                    appData.savedChallenges = [];
                    
                    snapshot.docs.forEach(doc => {
                        const challenge = { id: doc.id, ...doc.data() };
                        if (challenge.status === 'current') {
                            appData.currentChallenges.push(challenge);
                        } else if (challenge.status === 'saved') {
                            appData.savedChallenges.push(challenge);
                        }
                    });
                    
                    if (appData.currentPage === 'current' || appData.currentPage === 'saved') {
                        render();
                    }
                }
            );
            appData.listeners.push(unsubscribeChallenges);

            // استماع للملاحظات
            const unsubscribeNotes = firestoreHelpers.listenToCollection(
                COLLECTIONS.NOTES,
                (notes) => {
                    appData.notes = notes;
                    if (appData.currentPage === 'notes') {
                        render();
                    }
                }
            );
            appData.listeners.push(unsubscribeNotes);
        }

        // دوال تحميل/إخفاء شاشة التحميل

            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        // دولاب الحظ (نفس الكود مع تعديلات طفيفة)
        function renderWheel() {
            const hasIncompleteChallenges = appData.currentChallenges.length > 0;
            let missingItems = [];
            if (appData.games.length === 0) missingItems.push('ألعاب');
            if (appData.players.length === 0) missingItems.push('لاعبين');
            if (appData.cards.length === 0) missingItems.push('بطاقات');
            
            if (missingItems.length > 0 && !hasIncompleteChallenges) {
                return `
                    <div class="container">
                        <div class="header">
                            <button class="btn btn-back" onclick="goBack()">← رجوع</button>
                            <h2 class="title">دولاب الحظ العشوائي</h2>
                            <div></div>
                        </div>
                        <div class="warning-message">
                            <h3 style="color: #EF4444; margin-bottom: 15px;">⚠️ لا يمكن بدء تحدي جديد</h3>
                            <p style="font-size: 1.2rem;">الرجاء إضافة ${missingItems.join(' و')} من الإعدادات أولاً.</p>
                            <button class="btn btn-info" onclick="navigateTo('settings')" style="margin-top: 15px;">
                                الذهاب إلى الإعدادات
                            </button>
                        </div>
                    </div>
                `;
            }

            let items = [];
            if (appData.wheelStep === 'games') items = appData.games;
            else if (appData.wheelStep === 'players') items = appData.availablePlayers.map(p => p.name);
            else if (appData.wheelStep === 'cards') items = appData.availableCards;

            const colors = ['#EF4444', '#3B82F6', '#EAB308', '#22C55E'];
            const segmentAngle = 360 / items.length;

            let svg = `<svg viewBox="0 0 200 200" id="wheel">`;
            
            if (items.length === 1) {
                svg += `
                    <circle cx="100" cy="100" r="100" fill="#3B82F6" stroke="#000" stroke-width="2"/>
                    <text x="180" y="105" fill="white" font-size="12" font-weight="bold" text-anchor="end" dominant-baseline="middle">
                        ${items[0]}
                    </text>
                `;
            } else {
                items.forEach((item, index) => {
                    const startAngle = index * segmentAngle - 90;
                    const endAngle = startAngle + segmentAngle;
                    const largeArcFlag = segmentAngle > 180 ? 1 : 0;
                    
                    const x1 = 100 + 100 * Math.cos(startAngle * Math.PI / 180);
                    const y1 = 100 + 100 * Math.sin(startAngle * Math.PI / 180);
                    const x2 = 100 + 100 * Math.cos(endAngle * Math.PI / 180);
                    const y2 = 100 + 100 * Math.sin(endAngle * Math.PI / 180);
                    
                    const textAngle = startAngle + segmentAngle / 2;
                    const textX = 100 + 60 * Math.cos(textAngle * Math.PI / 180);
                    const textY = 100 + 60 * Math.sin(textAngle * Math.PI / 180);
                    
                    svg += `
                        <path d="M 100 100 L ${x1} ${y1} A 100 100 0 ${largeArcFlag} 1 ${x2} ${y2} Z"
                              fill="${colors[index % colors.length]}"
                              stroke="#000"
                              stroke-width="2"/>
                        <text x="${textX}" y="${textY}"
                              fill="white"
                              font-size="10"
                              font-weight="bold"
                              text-anchor="middle"
                              dominant-baseline="middle"
                              transform="rotate(${textAngle + 90}, ${textX}, ${textY})">
                            ${item}
                        </text>
                    `;
                });
            }
            
            svg += `<circle cx="100" cy="100" r="20" fill="white"/></svg>`;

            let stepText = '';
            if (appData.wheelStep === 'games') stepText = 'اختيار اللعبة';
            else if (appData.wheelStep === 'players') stepText = `اللعبة: ${appData.selectedGame} - اختيار اللاعب`;
            else if (appData.wheelStep === 'cards') stepText = `اللاعب: ${appData.currentChallenge?.currentPlayer?.name} - اختيار البطاقة`;

            let currentPlayers = '';
            if (appData.currentChallenge && appData.currentChallenge.players && appData.currentChallenge.players.length > 0) {
                currentPlayers = `
                    <div class="card mt-4" style="max-width: 600px; margin: 0 auto;">
                        <h3 class="card-title">اللاعبون الحاليون:</h3>
                        ${appData.currentChallenge.players.map(p => `
                            <div class="list-item">
                                <span>${p.player.name}</span>
                                <span style="color: #FFD700;">${p.card}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            const hasActiveChallenge = appData.currentChallenges.length > 0;
            const isChallengeInProgress = appData.currentChallenge !== null;
            
            let wheelMessage = '';
            let wheelDisabled = false;
            
            if (hasActiveChallenge) {
                wheelMessage = '<div class="challenge-warning">⚠️ أنهِ التحدي الحالي لكي تستطيع بدء تحدي جديد</div>';
                wheelDisabled = true;
            } else if (!isChallengeInProgress) {
                wheelMessage = '<div class="start-challenge-text" onclick="startNewChallenge()">🎯 بدء تحدي</div>';
            }

            return `
                <div class="container">
                    <div class="header">
                        <button class="btn btn-back" onclick="goBack()">← رجوع</button>
                        <h2 class="title">دولاب الحظ العشوائي</h2>
                        <div></div>
                    </div>
                    <div class="wheel-container">
                        ${wheelMessage}
                        <p class="wheel-info">${stepText}</p>
                        ${!wheelDisabled ? '<p style="color: #FCD34D; font-size: 1.2rem;">انقر لتدوير العجلة</p>' : ''}
                        <div class="wheel-wrapper">
                            <div class="wheel-pointer"></div>
                            ${svg}
                        </div>
                        ${currentPlayers}
                    </div>
                </div>
            `;
        }

        // بقية دوال دولاب الحظ
        function startNewChallenge() {
            appData.wheelStep = 'games';
            appData.selectedGame = null;
            appData.currentChallenge = null;
            appData.availablePlayers = [...appData.players];
            appData.availableCards = [...appData.cards];
            appData.rotation = 0;
            saveData();
            render();
        }

        function spinWheel() {
            if (appData.isSpinning || appData.currentChallenges.length > 0) return;
            
            playWheelSound();
            appData.isSpinning = true;
            const spins = 5 + Math.random() * 5;
            appData.rotation += 360 * spins + Math.random() * 360;
            
            const wheel = document.getElementById('wheel');
            if (wheel) {
                wheel.style.transform = `rotate(${appData.rotation}deg)`;
            }
            
            setTimeout(() => {
                appData.isSpinning = false;
                handleWheelResult();
            }, 6000);
        }

        async function handleWheelResult() {
            const normalizedRotation = appData.rotation % 360;
            
            if (appData.wheelStep === 'games') {
                const segmentAngle = 360 / appData.games.length;
                const selectedIndex = Math.floor((360 - normalizedRotation) / segmentAngle) % appData.games.length;
                const game = appData.games[selectedIndex];
                
                appData.selectedGame = game;
                appData.games = appData.games.filter(g => g !== game);
                appData.currentChallenge = {
                    game: game,
                    players: [],
                    createdAt: new Date().toISOString()
                };
                appData.wheelStep = 'players';
                appData.rotation = 0;
                
                showResultBanner(`🎮 تم اختيار اللعبة: ${game}`, "appData.rotation = 0; saveData(); render();");
                
            } else if (appData.wheelStep === 'players') {
                if (appData.availablePlayers.length === 0) {
                    const challenge = {
                        ...appData.currentChallenge,
                        id: Date.now(),
                        status: 'current'
                    };
                    appData.currentChallenges.push(challenge);
                    await firestoreHelpers.saveDoc(COLLECTIONS.CHALLENGES, challenge.id, challenge);
                    startNewChallenge();
                    return;
                }
                
                const segmentAngle = 360 / appData.availablePlayers.length;
                const selectedIndex = Math.floor((360 - normalizedRotation) / segmentAngle) % appData.availablePlayers.length;
                const player = appData.availablePlayers[selectedIndex];
                
                appData.availablePlayers = appData.availablePlayers.filter(p => p.id !== player.id);
                appData.currentChallenge.currentPlayer = player;
                appData.wheelStep = 'cards';
                appData.rotation = 0;
                
                showResultBanner(`👤 تم اختيار اللاعب: ${player.name}`, "appData.rotation = 0; saveData(); render();");
                
            } else if (appData.wheelStep === 'cards') {
                const segmentAngle = 360 / appData.availableCards.length;
                const selectedIndex = Math.floor((360 - normalizedRotation) / segmentAngle) % appData.availableCards.length;
                const card = appData.availableCards[selectedIndex];
                
                appData.currentChallenge.players = appData.currentChallenge.players || [];
                appData.currentChallenge.players.push({
                    player: appData.currentChallenge.currentPlayer,
                    card: card,
                    points: 0
                });
                
                appData.availableCards = appData.availableCards.filter(c => c !== card);
                
                if (appData.availablePlayers.length === 0) {
                    const challenge = {
                        ...appData.currentChallenge,
                        id: Date.now(),
                        status: 'current'
                    };
                    appData.currentChallenges.push(challenge);
                    await firestoreHelpers.saveDoc(COLLECTIONS.CHALLENGES, challenge.id, challenge);
                    
                    showResultBanner(`🎯 اكتمل التحدي! تم اختيار ${appData.currentChallenge.players.length} لاعبين`, "startNewChallenge();");
                } else {
                    appData.wheelStep = 'players';
                    appData.rotation = 0;
                    
                    showResultBanner(`🃏 تم اختيار البطاقة: ${card}`, "appData.rotation = 0; saveData(); render();");
                }
            }
            
            saveData();
        }

        async function finishChallenge(index) {
            const challenge = appData.currentChallenges[index];
            
            const panel = document.createElement('div');
            panel.className = 'points-input-panel';
            panel.innerHTML = `
                <h3>🔢 أدخل نقاط جميع اللاعبين</h3>
                ${challenge.players.map((p, i) => `
                    <div class="points-input-item">
                        <span style="font-size: 1.2rem; font-weight: bold;">
                            ${p.player.name} - ${p.card}
                        </span>

                    </div>
                `).join('')}
                <div class="btn-group" style="margin-top: 20px;">
                    <button class="btn btn-success" onclick="confirmFinishChallenge(${index})">✅ تأكيد النقاط</button>
                    <button class="btn btn-danger" onclick="cancelFinishChallenge()">❌ إلغاء</button>
                </div>
            `;
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <button class="btn btn-back" onclick="goBack()">← رجوع</button>
                        <h2 class="title">إنهاء التحدي: ${challenge.game}</h2>
                        <div></div>
                    </div>
                    ${panel.outerHTML}
                </div>
            `;
        }

        async function confirmFinishChallenge(index) {
            const challenge = appData.currentChallenges[index];
            const pointsData = {};
            
            challenge.players.forEach((p, i) => {
                const input = document.getElementById(`points-${i}`);
                const points = parseInt(input.value) || 0;
                pointsData[p.player.id] = points;
            });
            
            const updatedChallenge = {
                ...challenge,
                status: 'saved',
                completedAt: new Date().toISOString(),
                players: challenge.players.map(p => ({
                    ...p,
                    points: pointsData[p.player.id] || 0
                }))
            };
            
            // تحديث نقاط اللاعبين
            for (const challengePlayer of updatedChallenge.players) {
                const playerIndex = appData.players.findIndex(p => p.id === challengePlayer.player.id);
                if (playerIndex !== -1) {
                    const player = appData.players[playerIndex];
                    const historyEntry = {
                        challengeId: updatedChallenge.id,
                        game: updatedChallenge.game,
                        card: challengePlayer.card,
                        points: challengePlayer.points,
                        date: updatedChallenge.completedAt
                    };
                    
                    appData.players[playerIndex] = {
                        ...player,
                        points: player.points + challengePlayer.points,
                        challenges: player.challenges + 1,
                        cards: player.cards + 1,
                        challengeHistory: [...(player.challengeHistory || []), historyEntry]
                    };
                    
                    // حفظ اللاعب المحدث في Firestore
                    await firestoreHelpers.saveDoc(COLLECTIONS.PLAYERS, player.id, appData.players[playerIndex]);
                }
            }
            
            // نقل التحدي من الحالي إلى المحفوظ
            appData.currentChallenges.splice(index, 1);
            appData.savedChallenges.push(updatedChallenge);
            
            // حفظ التحدي المكتمل وحذف القديم
            await firestoreHelpers.saveDoc(COLLECTIONS.CHALLENGES, updatedChallenge.id, updatedChallenge);
            await firestoreHelpers.deleteDoc(COLLECTIONS.CHALLENGES, challenge.id);
            
            hideLoading();
            goBack();
        }

        function cancelFinishChallenge() {
            render();
        }

        async function deleteCurrentChallenge(index) {
            if (confirm('هل أنت متأكد من حذف هذا التحدي؟')) {
                const challenge = appData.currentChallenges[index];
                appData.currentChallenges.splice(index, 1);
                await firestoreHelpers.deleteDoc(COLLECTIONS.CHALLENGES, challenge.id);
                render();
            }
        }

                                ${appData.currentUser.type === 'admin' ? `

        async function deleteSavedChallenge(index) {
            if (confirm('هل أنت متأكد من حذف هذا التحدي؟ سيتم خصم النقاط من اللاعبين.')) {
                const challenge = appData.savedChallenges[index];
                
                // خصم النقاط من اللاعبين
                for (const challengePlayer of challenge.players) {
                    const playerIndex = appData.players.findIndex(p => p.id === challengePlayer.player.id);
                    if (playerIndex !== -1) {
                        const player = appData.players[playerIndex];
                        appData.players[playerIndex] = {
                            ...player,
                            points: Math.max(0, player.points - challengePlayer.points),
                            challenges: Math.max(0, player.challenges - 1),
                            cards: Math.max(0, player.cards - 1),
                            challengeHistory: (player.challengeHistory || []).filter(
                                h => h.challengeId !== challenge.id
                            )
                        };
                        
                        // تحديث اللاعب في Firestore
                        await firestoreHelpers.saveDoc(COLLECTIONS.PLAYERS, player.id, appData.players[playerIndex]);
                    }
                }
                
                // حذف التحدي
                appData.savedChallenges.splice(index, 1);
                await firestoreHelpers.deleteDoc(COLLECTIONS.CHALLENGES, challenge.id);
                
                render();
            }
        }

        async function applyPointsAdjustment() {
            const playerId = parseInt(document.getElementById('adjustPlayerId').value);
            const addPoints = parseInt(document.getElementById('addPoints').value) || 0;
            const subtractPoints = parseInt(document.getElementById('subtractPoints').value) || 0;
            
            if (!playerId) {
                alert('الرجاء اختيار لاعب');
                return;
            }
            
            const playerIndex = appData.players.findIndex(p => p.id === playerId);
            if (playerIndex !== -1) {
                const player = appData.players[playerIndex];
                let newPoints = player.points + addPoints - subtractPoints;
                newPoints = Math.max(0, newPoints);
                
                appData.players[playerIndex] = {
                    ...player,
                    points: newPoints
                };
                
                // حفظ في Firestore
                await firestoreHelpers.saveDoc(COLLECTIONS.PLAYERS, playerId, appData.players[playerIndex]);
                
                alert('تم تحديث النقاط بنجاح');
                goBack();
            }
        }

                        where('username', '==', userData.username)
                    );
                    const querySnapshot = await getDocs(usersQuery);
                    
                    if (!querySnapshot.empty) {
                        appData.currentUser = querySnapshot.docs[0].data();
                        initRealTimeListeners();
                    }
                }
                
                render();
            } catch (e) {
                console.error('خطأ في بدء التطبيق:', e);
                document.getElementById('app').innerHTML = `
                    <div class="error-message">
                        <h2>⚠️ حدث خطأ في التطبيق</h2>
                        <p>حاول تحديث الصفحة أو التحقق من إعدادات Firebase.</p>
                        <p>التفاصيل: ${e.message}</p>
                    </div>
                `;
            }
        }

        // استدعاء بدء التطبيق
        initApp();
    </script>
</body>
</html>
