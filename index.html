<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maherco.Challenges</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* النيازك والنجوم */
        .star {
            position: fixed;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            background: linear-gradient(135deg, #FFD700, #FFA500, #FFEB3B);
            box-shadow: 
                0 0 30px #FFD700,
                0 0 60px rgba(255, 215, 0, 0.8),
                inset 0 0 15px rgba(255, 255, 255, 0.9);
            animation: starPulse 3s infinite ease-in-out;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes starPulse {
            0%, 100% { 
                opacity: 0.6; 
                transform: scale(0.8) rotate(0deg);
            }
            50% { 
                opacity: 1; 
                transform: scale(1.5) rotate(180deg);
            }
        }

        .meteor {
            position: fixed;
            width: 3px;
            height: 3px;
            background: linear-gradient(to bottom, transparent, #FFD700, #FFA500);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
        }

        .meteor::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 2px;
            background: linear-gradient(to left, transparent, #FFD700, #FFA500);
            transform: translateX(-100px);
            border-radius: 50%;
        }

        @keyframes meteorFall {
            0% {
                transform: translateY(-100px) translateX(0) rotate(45deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) translateX(100px) rotate(45deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: calc(100vh - 80px); /* لترك مساحة في الأسفل */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
        }

        .btn-back {
            background: #F59E0B;
            color: #fff;
        }

        .btn-logout {
            background: #EF4444;
            color: #fff;
        }

        .btn-success {
            background: #10B981;
            color: #fff;
        }

        .btn-danger {
            background: #EF4444;
            color: #fff;
        }

        .btn-info {
            background: #3B82F6;
            color: #fff;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: rgba(0,0,0,0.3);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #FFD700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #FFD700;
            border-radius: 15px;
            background: #1F2937;
            color: #fff;
            font-size: 1rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .menu-item {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            border: none;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .menu-item:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
            opacity: 1;
        }

        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .wheel-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            transition: transform 6s cubic-bezier(0.17, 0.67, 0.12, 0.99); 
            cursor: pointer;
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 20px solid #EF4444;
            z-index: 10;
        }

        .wheel-info {
            text-align: center;
            font-size: 1.5rem;
            color: #FFD700;
        }

        .card {
            background: rgba(0,0,0,0.3);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #FFD700;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.8rem;
            color: #FFD700;
            margin-bottom: 15px;
        }

        .list-item {
            background: rgba(0,0,0,0.3);

            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #FFD700;
        }

        .player-rank {
            font-size: 2rem;
            font-weight: bold;
            margin-left: 20px;
        }

        .rank-1 { color: #FFD700; }
        .rank-2 { color: #C0C0C0; }
        .rank-3 { color: #CD7F32; }

        .settings-grid {
            display: grid;
            gap: 15px;
            margin-top: 30px;
        }

        .settings-btn {
            background: rgba(0,0,0,0.3);
            border: 2px solid #FFD700;
            padding: 20px;
            border-radius: 15px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .settings-btn:hover {
            background: rgba(0,0,0,0.3);
            transform: translateX(-5px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #FFD700;
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #FFD700;
            border-radius: 10px;
            background: #1F2937;
            color: #fff;
            font-size: 1rem;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #FFD700;
            border-radius: 10px;
            background: #1F2937;
            color: #fff;
            font-size: 1rem;
            min-height: 120px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-group .btn {
            flex: 1;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 1.8rem;
            }

            .wheel-wrapper {
                width: 300px;
                height: 300px;
            }

            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .spinner {
            border: 3px solid rgba(255, 215, 0, 0.3);
            border-top: 3px solid #FFD700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .text-center {
            text-align: center;
        }

        .text-gray {
            color: #9CA3AF;
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .mt-4 {
            margin-top: 1rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .gap-4 {
            gap: 1rem;
        }

        .points-input-panel {
            background: rgba(0,0,0,0.3);
            border: 3px solid #FFD700;
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;

            margin-left: auto;

        }

        .points-input-panel h3 {
            color: #FFD700;

            margin-bottom: 20px;
            text-align: center;
        }

        .points-input-item {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #FFD700;
            display: flex;

        .points-input-item input {
            width: 120px;
            padding: 10px;
            border: 2px solid #FFD700;
            border-radius: 8px;
            background: #1F2937;
            color: #fff;

            text-align: center;
        }

        .btn-disabled {

            cursor: not-allowed !important;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-disabled:hover {

        .player-challenges-list {
            background: rgba(0,0,0,0.3);

        .challenge-item {
            background: rgba(0,0,0,0.3);

        .warning-message {
            background: rgba(239, 68, 68, 0.2);

            border-radius: 15px;
            padding: 20px;

        }

        .start-challenge-text {
            font-size: 2rem;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-challenge-text:hover {
            transform: scale(1.1);
            text-shadow: 0 0 30px rgba(255, 215, 0, 1);
        }

        .challenge-warning {
            background: rgba(239, 68, 68, 0.3);
            border: 3px solid #EF4444;
            color: #fff;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: bold;

            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        /* شريط النتيجة */
        .result-banner {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 1001;
            transition: top 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.7);

        }

        /* أيقونة إنستغرام في أسفل الصفحة */
        .footer-instagram {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #833AB4, #FD1D1D, #FCB045);
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(253, 29, 29, 0.5);

            cursor: pointer;
            transition: all 0.3s ease;
        }

        .footer-instagram:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .footer-instagram span {
            color: white;
            font-weight: bold;
            font-size: 1rem;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

<body>
    <div id="app"></div>

    <script>
        // البيانات الأساسية
        const appData = {
            currentUser: null,
            currentPage: 'login',
            pageHistory: [],
            siteName:'maherco',
            games: ['Cs2'],
            players: [
                { id: 1, name: 'Maherco', points: 0, challenges: 0, cards: 0, instagram: '', challengeHistory: [] }
            ],
            cards: ['X2'],
            users: [
                { id: 1, username: 'Sally', password: '013799', type: 'admin', createdAt: new Date().toISOString() }
            ],
            currentChallenges: [],
            savedChallenges: [],
            notes: [],
            wheelStep: 'games',
            selectedGame: null,
            currentChallenge: null,
            availablePlayers: [],
            availableCards: [],
            rotation: 0,
            isSpinning: false,
            selectedPlayer: null,
            soundEnabled: true,
            musicEnabled: false
        };

        // عنصر الصوت المخفي لصوت الدولاب الميكانيكي الجديد
        const audioElement = document.createElement('audio');
        audioElement.id = 'wheel-audio';
        audioElement.preload = 'auto';
        audioElement.style.display = 'none';
        
        // عنصر الصوت للموسيقى الخلفية
        const musicElement = document.createElement('audio');
        musicElement.id = 'background-music';
        musicElement.loop = true;
        musicElement.style.display = 'none';
        musicElement.src = 'Interstellar.mp3';
        
        // مكان وضع Data URI للصوت الجديد
        const WHEEL_SOUND_DATA_URI = 'wheel-voice.mp3';
        
        // دالة تشغيل صوت الدولاب الجديد
        function playWheelSound() {
            if (!appData.soundEnabled) return;
            
            try {
                const audio = document.getElementById('wheel-audio');
                if (audio) {
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log('مشكلة في تشغيل الصوت:', e));
                }
            } catch (e) {
                console.log('مشكلة في تشغيل الصوت الميكانيكي:', e);
            }
        }

        // دوال التحكم بالموسيقى
        function toggleMusic() {
            const music = document.getElementById('background-music');
            
            if (!music) return;
            
            if (music.paused) {
                music.currentTime = 0;
                music.play().catch(e => console.log('مشكلة في تشغيل الموسيقى:', e));
                appData.musicEnabled = true;
            } else {
                music.pause();
                music.currentTime = 0;
                appData.musicEnabled = false;
            }
            
            localStorage.setItem('MahercoMusicEnabled', JSON.stringify(appData.musicEnabled));
            saveData();
            render();
        }

        // دالة دمج البيانات بأمان
        function safeMerge(target, source) {
            if (!source || typeof source !== 'object') return;
            
            Object.keys(target).forEach(key => {
                if (source.hasOwnProperty(key)) {
                    if (Array.isArray(target[key]) && Array.isArray(source[key])) {
                        target[key] = source[key];
                    } else if (typeof target[key] === 'object' && typeof source[key] === 'object' && target[key] !== null) {
                        safeMerge(target[key], source[key]);
                    } else {
                        target[key] = source[key];
                    }
                }
            });
        }

        // تحميل وحفظ البيانات
        function loadData() {
            try {
                const savedData = localStorage.getItem('MahercoChallengesData');
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    safeMerge(appData, parsed);
                }
                
                const savedSound = localStorage.getItem('MahercoSoundEnabled');
                if (savedSound !== null) {
                    appData.soundEnabled = JSON.parse(savedSound);
                }
                
                const savedMusic = localStorage.getItem('MahercoMusicEnabled');
                if (savedMusic !== null) {
                    appData.musicEnabled = JSON.parse(savedMusic);
                }
                
                const savedUser = localStorage.getItem('MahercoCurrentUser');
                if (savedUser) {
                    const userData = JSON.parse(savedUser);
                    const user = appData.users.find(u => u.username === userData.username);
                    if (user) {
                        appData.currentUser = user;
                        appData.currentPage = 'home';
                    }
                }
            } catch (e) {
                console.warn('تعذر تحميل البيانات المحفوظة:', e);
            }
        }

        function saveData() {
            try {
                const dataToSave = {
                    games: appData.games,
                    players: appData.players,
                    cards: appData.cards,
                    users: appData.users,
                    currentChallenges: appData.currentChallenges,
                    savedChallenges: appData.savedChallenges,
                    notes: appData.notes,
                    siteName: appData.siteName,
                    soundEnabled: appData.soundEnabled,
                    musicEnabled: appData.musicEnabled
                };
                localStorage.setItem('MahercoChallengesData', JSON.stringify(dataToSave));
                
                if (appData.currentUser) {
                    localStorage.setItem('MahercoCurrentUser', JSON.stringify({
                        username: appData.currentUser.username,
                        loginTime: new Date().toISOString()
                    }));
                }
            } catch (e) {
                console.warn('تعذر حفظ البيانات:', e);
            }
        }

        // النيازك والنجوم
        function createSparkles() {
            setInterval(() => {
                for (let i = 0; i < 3; i++) {
                    if (Math.random() > 0.5) {
                        setTimeout(() => {
                            const star = document.createElement('div');
                            star.className = 'star';
                            star.style.left = Math.random() * 100 + '%';
                            star.style.top = Math.random() * 100 + '%';
                            star.style.width = (Math.random() * 6 + 4) + 'px';
                            star.style.height = star.style.width;
                            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                            document.body.appendChild(star);
                            
                            setTimeout(() => star.remove(), 5000 + Math.random() * 3000);
                        }, i * 200);
                    }
                }
            }, 800);
        }

        function createMeteorShower() {
            const colors = [
                'linear-gradient(to bottom, transparent, #FFD700, #FFA500)',
                'linear-gradient(to bottom, transparent, #FF69B4, #FF1493)',
                'linear-gradient(to bottom, transparent, #00FFFF, #0080FF)',
                'linear-gradient(to bottom, transparent, #FF6347, #FF4500)',
                'linear-gradient(to bottom, transparent, #9370DB, #8A2BE2)'
            ];
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const meteor = document.createElement('div');
                    meteor.className = 'meteor';
                    meteor.style.left = Math.random() * 100 + '%';
                    meteor.style.top = '-50px';
                    meteor.style.animation = 'meteorFall 2s linear forwards';
                    meteor.style.background = colors[Math.floor(Math.random() * colors.length)];
                    
                    const length = Math.random() * 80 + 40;
                    meteor.style.setProperty('--tail-length', length + 'px');
                    meteor.style.transform = `rotate(${Math.random() * 20 + 40}deg)`;
                    
                    document.body.appendChild(meteor);
                    
                    setTimeout(() => meteor.remove(), 2000);
                }, i * 150);
            }
        }

        function showResultBanner(text, nextStep) {
            const banner = document.createElement('div');
            banner.className = 'result-banner';
            banner.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px;">
                    <span>${text}</span>
                    <button class="btn btn-primary" onclick="this.closest('.result-banner').remove(); ${nextStep}">التالي →</button>
                </div>
            `;
            document.body.appendChild(banner);
            
            setTimeout(() => {
                banner.style.top = '20px';
            }, 100);
            
            createMeteorShower();
            setTimeout(() => createMeteorShower(), 500);
            
            setTimeout(() => {
                if (banner.parentNode) {
                    banner.remove();
                }
            }, 10000);
        }

        // دوال التنقل
        function navigateTo(page) {
            appData.pageHistory.push(appData.currentPage);
            appData.currentPage = page;
            render();
        }

        function goBack() {
            if (appData.pageHistory.length > 0) {
                appData.currentPage = appData.pageHistory.pop();
                render();
            }
        }

        function logout() {
            const music = document.getElementById('background-music');
            if (music && !music.paused) {
                music.pause();
                music.currentTime = 0;
            }
            appData.musicEnabled = false;
            localStorage.setItem('MahercoMusicEnabled', 'false');
            
            appData.currentUser = null;
            appData.currentPage = 'login';
            appData.pageHistory = [];
            localStorage.removeItem('MahercoCurrentUser');
            render();
        }

        // صفحة تسجيل الدخول
        function renderLogin() {
            return `
                <div class="login-container">
                    <div class="login-box">
                        <h1 class="title text-center mb-4">${appData.siteName}</h1>
                        <input type="text" id="username" class="input" placeholder="اسم المستخدم">
                        <input type="password" id="password" class="input" placeholder="كلمة المرور">
                        <button class="btn btn-primary" style="width: 100%;" onclick="handleLogin()">تسجيل الدخول</button>
                    </div>
                </div>
            `;
        }

        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

        function renderWheel() {
            const hasIncompleteChallenges = appData.currentChallenges.length > 0;
            
            let missingItems = [];
            if (appData.games.length === 0) missingItems.push('ألعاب');
            if (appData.players.length === 0) missingItems.push('لاعبين');
            if (appData.cards.length === 0) missingItems.push('بطاقات');
            
            if (missingItems.length > 0 && !hasIncompleteChallenges) {
                return `
                    <div class="container">
                        <div class="header">
                            <button class="btn btn-back" onclick="goBack()">← رجوع</button>
                            <h2 class="title">دولاب الحظ العشوائي</h2>
                            <div></div>
                        </div>
                        <div class="warning-message">
                            <h3 style="color: #EF4444; margin-bottom: 15px;">⚠️ لا يمكن بدء تحدي جديد</h3>
                            <p style="font-size: 1.2rem;">الرجاء إضافة ${missingItems.join(' و')} من الإعدادات أولاً.</p>
                            <button class="btn btn-info" onclick="navigateTo('settings')" style="margin-top: 15px;">
                                الذهاب إلى الإعدادات
                            </button>
                        </div>
                    </div>
                `;
            }

            let items = [];
            if (appData.wheelStep === 'games') items = appData.games;
            else if (appData.wheelStep === 'players') items = appData.availablePlayers.map(p => p.name);
            else if (appData.wheelStep === 'cards') items = appData.availableCards;

            const colors = ['#EF4444', '#3B82F6', '#EAB308', '#22C55E'];
            const segmentAngle = 360 / items.length;

            let svg = `<svg viewBox="0 0 200 200" id="wheel">`;
            
            if (items.length === 1) {
                svg += `
                    <circle cx="100" cy="100" r="100" fill="#3B82F6" stroke="#000" stroke-width="2"/>
                    <text x="180" y="105" fill="white" font-size="12" font-weight="bold" text-anchor="end" dominant-baseline="middle">
                        ${items[0]}
                    </text>
                `;
            } else {
                items.forEach((item, index) => {
                    const startAngle = index * segmentAngle - 90;
                    const endAngle = startAngle + segmentAngle;
                    const largeArcFlag = segmentAngle > 180 ? 1 : 0;
                    
                    const x1 = 100 + 100 * Math.cos(startAngle * Math.PI / 180);
                    const y1 = 100 + 100 * Math.sin(startAngle * Math.PI / 180);
                    const x2 = 100 + 100 * Math.cos(endAngle * Math.PI / 180);
                    const y2 = 100 + 100 * Math.sin(endAngle * Math.PI / 180);
                    
                    const textAngle = startAngle + segmentAngle / 2;
                    const textX = 100 + 60 * Math.cos(textAngle * Math.PI / 180);
                    const textY = 100 + 60 * Math.sin(textAngle * Math.PI / 180);
                    
                    svg += `
                        <path d="M 100 100 L ${x1} ${y1} A 100 100 0 ${largeArcFlag} 1 ${x2} ${y2} Z"
                              fill="${colors[index % colors.length]}"
                              stroke="#000"
                              stroke-width="2"/>
                        <text x="${textX}" y="${textY}"
                              fill="white"
                              font-size="10"
                              font-weight="bold"
                              text-anchor="middle"
                              dominant-baseline="middle"
                              transform="rotate(${textAngle + 90}, ${textX}, ${textY})">
                            ${item}
                        </text>
                    `;
                });
            }
            
            svg += `<circle cx="100" cy="100" r="20" fill="white"/></svg>`;

            let stepText = '';
            if (appData.wheelStep === 'games') stepText = 'اختيار اللعبة';
            else if (appData.wheelStep === 'players') stepText = `اللعبة: ${appData.selectedGame} - اختيار اللاعب`;
            else if (appData.wheelStep === 'cards') stepText = `اللاعب: ${appData.currentChallenge?.currentPlayer?.name} - اختيار البطاقة`;

            let currentPlayers = '';
            if (appData.currentChallenge && appData.currentChallenge.players && appData.currentChallenge.players.length > 0) {
                currentPlayers = `
                    <div class="card mt-4" style="max-width: 600px; margin: 0 auto;">
                        <h3 class="card-title">اللاعبون الحاليون:</h3>
                        ${appData.currentChallenge.players.map(p => `
                            <div class="list-item">
                                <span>${p.player.name}</span>
                                <span style="color: #FFD700;">${p.card}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            const hasActiveChallenge = appData.currentChallenges.length > 0;
            const isChallengeInProgress = appData.currentChallenge !== null;
            
            let wheelMessage = '';
            let wheelDisabled = false;
            
            if (hasActiveChallenge) {
                wheelMessage = '<div class="challenge-warning">⚠️ أنهِ التحدي الحالي لكي تستطيع بدء تحدي جديد</div>';
                wheelDisabled = true;
            } else if (!isChallengeInProgress) {
                wheelMessage = '<div class="start-challenge-text" onclick="startNewChallenge()">🎯 بدء تحدي</div>';
            }

            return `
                <div class="container">
                    <div class="header">
                        <button class="btn btn-back" onclick="goBack()">← رجوع</button>
                        <h2 class="title">دولاب الحظ العشوائي</h2>
                        <div></div>
                    </div>
                    <div class="wheel-container">
                        ${wheelMessage}
                        <p class="wheel-info">${stepText}</p>
                        ${!wheelDisabled ? '<p style="color: #FCD34D; font-size: 1.2rem;">انقر لتدوير العجلة</p>' : ''}
                        <div class="wheel-wrapper">
                            <div class="wheel-pointer"></div>
                            ${svg}
                        </div>
                        ${currentPlayers}
                    </div>
                </div>
            `;
        }

        function startNewChallenge() {
            appData.wheelStep = 'games';
            appData.selectedGame = null;
            appData.currentChallenge = null;
            appData.availablePlayers = [...appData.players];
            appData.availableCards = [...appData.cards];
            appData.rotation = 0;
            saveData();
            render();
        }

        function spinWheel() {
            if (appData.isSpinning || appData.currentChallenges.length > 0) {
                return;
            }
            
            playWheelSound();
            
            appData.isSpinning = true;
            const spins = 5 + Math.random() * 5;
            appData.rotation += 360 * spins + Math.random() * 360;
            
            const wheel = document.getElementById('wheel');
            if (wheel) {
                wheel.style.transform = `rotate(${appData.rotation}deg)`;
            }
            
            setTimeout(() => {
                appData.isSpinning = false;
                handleWheelResult();
            }, 6000);
        }

        function handleWheelResult() {
            const normalizedRotation = appData.rotation % 360;
            
            if (appData.wheelStep === 'games') {
                const segmentAngle = 360 / appData.games.length;
                const selectedIndex = Math.floor((360 - normalizedRotation) / segmentAngle) % appData.games.length;
                const game = appData.games[selectedIndex];
                
                appData.selectedGame = game;
                appData.games = appData.games.filter(g => g !== game);
                appData.currentChallenge = {
                    game: game,
                    players: [],
                    createdAt: new Date().toISOString()
                };
                appData.wheelStep = 'players';
                appData.rotation = 0;
                
                showResultBanner(`🎮 تم اختيار اللعبة: ${game}`, "appData.rotation = 0; saveData(); render();");
                
            } else if (appData.wheelStep === 'players') {
                if (appData.availablePlayers.length === 0) {
                    const challenge = {
                        ...appData.currentChallenge,
                        id: Date.now(),
                        status: 'current'
                    };
                    appData.currentChallenges.push(challenge);
                    startNewChallenge();
                    return;
                }
                
                const segmentAngle = 360 / appData.availablePlayers.length;
                const selectedIndex = Math.floor((360 - normalizedRotation) / segmentAngle) % appData.availablePlayers.length;
                const player = appData.availablePlayers[selectedIndex];
                
                appData.availablePlayers = appData.availablePlayers.filter(p => p.id !== player.id);
                appData.currentChallenge.currentPlayer = player;
                appData.wheelStep = 'cards';
                appData.rotation = 0;
                
                showResultBanner(`👤 تم اختيار اللاعب: ${player.name}`, "appData.rotation = 0; saveData(); render();");
                
            } else if (appData.wheelStep === 'cards') {
                const segmentAngle = 360 / appData.availableCards.length;
                const selectedIndex = Math.floor((360 - normalizedRotation) / segmentAngle) % appData.availableCards.length;
                const card = appData.availableCards[selectedIndex];
                
                appData.currentChallenge.players = appData.currentChallenge.players || [];
                appData.currentChallenge.players.push({
                    player: appData.currentChallenge.currentPlayer,
                    card: card,
                    points: 0
                });
                
                appData.availableCards = appData.availableCards.filter(c => c !== card);
                
                if (appData.availablePlayers.length === 0) {
                    const challenge = {
                        ...appData.currentChallenge,
                        id: Date.now(),
                        status: 'current'
                    };
                    appData.currentChallenges.push(challenge);
                    
                    showResultBanner(`🎯 اكتمل التحدي! تم اختيار ${appData.currentChallenge.players.length} لاعبين`, "startNewChallenge();");
                } else {
                    appData.wheelStep = 'players';
                    appData.rotation = 0;
                    
                    showResultBanner(`🃏 تم اختيار البطاقة: ${card}`, "appData.rotation = 0; saveData(); render();");
                }
            }
            
            saveData();
        }

        function finishChallenge(index) {
            const challenge = appData.currentChallenges[index];
            
            const panel = document.createElement('div');
            panel.className = 'points-input-panel';
            panel.innerHTML = `
                <h3>🔢 أدخل نقاط جميع اللاعبين</h3>

                    <button class="btn btn-danger" onclick="cancelFinishChallenge()">❌ إلغاء</button>
                </div>
`; 
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <button class="btn btn-back" onclick="goBack()">← رجوع</button>

        function confirmFinishChallenge(index) {
            const challenge = appData.currentChallenges[index];
            const pointsData = {};
            
            challenge.players.forEach((p, i) => {
                const input = document.getElementById(`points-${i}`);
                const points = parseInt(input.value) || 0;
                pointsData[p.player.id] = points;
            });
            
            const updatedChallenge = {
                ...challenge,
                id: Date.now(),
                status: 'saved',
                completedAt: new Date().toISOString(),
                players: challenge.players.map(p => ({
                    ...p,
                    points: pointsData[p.player.id] || 0
                }))
            };
            
            appData.players = appData.players.map(player => {
                const challengePlayer = updatedChallenge.players.find(p => p.player.id === player.id);
                if (challengePlayer) {
                    const historyEntry = {
                        challengeId: updatedChallenge.id,
                        game: updatedChallenge.game,
                        card: challengePlayer.card,
                        points: challengePlayer.points,
                        date: updatedChallenge.completedAt
                    };
                    
                    return {
                        ...player,
                        points: player.points + challengePlayer.points,
                        challenges: player.challenges + 1,
                        cards: player.cards + 1,
                        challengeHistory: [...(player.challengeHistory || []), historyEntry]
                    };
                }
                return player;
            });
            
            appData.savedChallenges.push(updatedChallenge);
            appData.currentChallenges.splice(index, 1);
            
            saveData();
            goBack();
        }

        function cancelFinishChallenge() {
            render();
        }

        function deleteSavedChallenge(index) {
            if (confirm('هل أنت متأكد من حذف هذا التحدي؟ سيتم خصم النقاط من اللاعبين.')) {
                const challenge = appData.savedChallenges[index];
                
                appData.players = appData.players.map(player => {
                    const challengePlayer = challenge.players.find(p => p.player.id === player.id);
                    if (challengePlayer) {
                        const updatedHistory = (player.challengeHistory || []).filter(
                            h => h.challengeId !== challenge.id
                        );
                        
                        return {
                            ...player,
                            points: Math.max(0, player.points - challengePlayer.points),
                            challenges: Math.max(0, player.challenges - 1),
                            cards: Math.max(0, player.cards - 1),
                            challengeHistory: updatedHistory
                        };
                    }
                    return player;
                });
                
                appData.savedChallenges.splice(index, 1);
                saveData();
                render();
            }
        }

        function applyPointsAdjustment() {
            const playerId = parseInt(document.getElementById('adjustPlayerId').value);
            const addPoints = parseInt(document.getElementById('addPoints').value) || 0;
            const subtractPoints = parseInt(document.getElementById('subtractPoints').value) || 0;
            
            if (!playerId) {
                alert('الرجاء اختيار لاعب');
                return;
            }
            
            appData.players = appData.players.map(p => {
                if (p.id === playerId) {
                    let newPoints = p.points + addPoints - subtractPoints;
                    return { ...p, points: Math.max(0, newPoints) };
                }
                return p;
            });
            
            saveData();
            alert('تم تحديث النقاط بنجاح');
            goBack();
        }

                    break;

                                <stop offset="0.5" stop-color="#FD1D1D"/>
                                <stop offset="1" stop-color="#FCB045"/>

                        </defs>
                    </svg>
                    <span>Sally</span>

                        wheel.addEventListener('click', spinWheel);
                    }
                }, 100);
            }
